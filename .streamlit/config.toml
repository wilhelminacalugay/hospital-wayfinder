[theme]
# Use the Hospital's Dark Green for buttons, loading bars, and highlights
primaryColor="#03542b"

# Pure white main background
backgroundColor="#FFFFFF"

# A very light, subtle tint of the green for the sidebar so black text is readable
secondaryBackgroundColor="#eef7f2"

# Dark gray/black text for maximum readability across the whole app
textColor="#262730"

font="sans serif"
